<template id="housing-card">
  <style>
    :host {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 0.6rem;
      background-color: rgba(255, 255, 255, 0.05);
      padding: 1.6rem;
      position: relative;
    }

    h2 {
      margin-top: 0;
    }

    slot[name="title"] {
      font-weight: 400;
    }

    slot[name="type"] {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.4rem;
      text-transform: capitalize;
    }
  </style>
  <div class="housing-card">
    <h2><slot name="title"></slot></h2>
    <p><slot name="owner"></slot></p>
    <p><slot name="type"></slot></p>
    <p><slot name="price"></slot></p>
  </div>
</template>

<ul id="housing" class="housings-list --loading"></ul>
