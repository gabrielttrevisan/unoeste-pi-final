<template id="person-card">
  <style>
    :host {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 0.6rem;
      background-color: rgba(255, 255, 255, 0.05);
      padding: 1.6rem;
      position: relative;
    }

    h2 {
      margin-top: 0;
    }

    slot[name="name"] {
      font-weight: 400;
    }

    .contact > span:first-child {
      font-weight: 500;
    }

    .contact-list {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.4rem;
    }

    .actions {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      flex-direction: column;
      gap: 0.4rem;
      position: absolute;
      top: 1.6rem;
      right: 1.6rem;
      z-index: 2;

      > button {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0;
        color: var(--colors-foreground);
        background: #666666;
        transition: all 200ms ease;
        border: 0;
        border-radius: 0.4rem;
        padding: 0.8rem 1rem;
        cursor: pointer;

        span {
          width: 0;
          overflow: hidden;
        }

        &:hover {
          background: #999999;
          gap: 0.4rem;

          &.delete {
            background: rgb(167, 101, 101);
            color: rgb(255, 222, 222);
          }

          span {
            width: auto;
          }
        }
      }
    }
  </style>
  <div class="person-card">
    <h2><slot name="name"></slot></h2>
    <p><span>CPF:&nbsp;</span><slot name="code"></slot></p>
    <div class="contact-list">
      <div class="contact"><span>E-mail:</span><slot name="email"></slot></div>
      <div class="contact">
        <span>Telefone:</span><slot name="phone"></slot>
      </div>
    </div>

    <div class="actions">
      <button class="edit">
        <span>EDITAR</span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="16"
          height="16"
          fill="currentColor"
        >
          <path
            d="M15.7279 9.57627L14.3137 8.16206L5 17.4758V18.89H6.41421L15.7279 9.57627ZM17.1421 8.16206L18.5563 6.74785L17.1421 5.33363L15.7279 6.74785L17.1421 8.16206ZM7.24264 20.89H3V16.6473L16.435 3.21231C16.8256 2.82179 17.4587 2.82179 17.8492 3.21231L20.6777 6.04074C21.0682 6.43126 21.0682 7.06443 20.6777 7.45495L7.24264 20.89Z"
          ></path>
        </svg>
      </button>
      <button class="delete">
        <span>EXCLUIR</span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="16"
          height="16"
          fill="currentColor"
        >
          <path
            d="M17 6H22V8H20V21C20 21.5523 19.5523 22 19 22H5C4.44772 22 4 21.5523 4 21V8H2V6H7V3C7 2.44772 7.44772 2 8 2H16C16.5523 2 17 2.44772 17 3V6ZM18 8H6V20H18V8ZM9 11H11V17H9V11ZM13 11H15V17H13V11ZM9 4V6H15V4H9Z"
          ></path>
        </svg>
      </button>
    </div>
  </div>
</template>

<ul id="people" class="people-list --loading"></ul>

<div id="toast-region"></div>
